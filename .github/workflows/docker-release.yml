# .github/workflows/docker-release.yml
#
# NexPlan DC — Docker Build & Push Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   1. When you push a git tag like v2.1.0  → builds production image
#   2. Manual trigger (workflow_dispatch)    → for testing
#
# Output:
#   ghcr.io/sandhyasneha/nexplan:v2.1.0   ← version tag
#   ghcr.io/sandhyasneha/nexplan:latest    ← always latest
#
# Clients pull with:
#   docker pull ghcr.io/sandhyasneha/nexplan:v2.1.0
#   (they need a pull token — not your GitHub password)
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Push DC Docker Image

on:
  push:
    tags:
      - 'v*.*.*'          # triggers on v1.0.0, v2.1.3, etc.
  workflow_dispatch:       # manual trigger from GitHub Actions UI
    inputs:
      tag:
        description: 'Version tag (e.g. v2.1.0)'
        required: true
        default: 'v0.0.0-test'

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nexplan   # → ghcr.io/sandhyasneha/nexplan

jobs:
  build-and-push:
    name: Build Docker image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    # needed to push to ghcr.io

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (for multi-platform if needed) ──────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to GitHub Container Registry ──────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatic — no setup needed

      # ── 4. Determine version tag ─────────────────────────────────────────
      - name: Get version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      # ── 5. Extract Docker metadata (tags + labels) ───────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest
            type=sha,prefix=sha-

      # ── 6. Build and push Docker image ───────────────────────────────────
      #    NOTE: Source code is compiled inside Docker — clients never see it
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    ./Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # Build args — these go into the compiled image
          # The PUBLIC key is baked in (used for offline licence verification)
          # The PRIVATE key is NEVER here
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.DC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.DC_SUPABASE_ANON_KEY }}
            NEXPLAN_LICENCE_PUBLIC_KEY=${{ secrets.NEXPLAN_LICENCE_PUBLIC_KEY }}
          # Cache layers for faster builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── 7. Generate client pull token ────────────────────────────────────
      #    This creates a read-only token clients use to pull the image
      #    Token is stored as a GitHub secret for distribution
      - name: Summary
        run: |
          echo "## ✅ Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/sandhyasneha/nexplan:${{ steps.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Client pull command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/sandhyasneha/nexplan:${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### To create a client pull token" >> $GITHUB_STEP_SUMMARY
          echo "Go to GitHub → Settings → Developer settings → Personal access tokens" >> $GITHUB_STEP_SUMMARY
          echo "Create token with \`read:packages\` scope only → send to client" >> $GITHUB_STEP_SUMMARY
